spring.application.name=BookManagementSystem

# Database Configuration (SQL Server)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BookManagementDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT Configurations
# Secret key must be at least 256 bits (32 bytes) long
app.jwt.secret=bookManagementSystemSecretKeyMustBeVeryLongToMeetHmacShaRequirements123456
app.jwt.expiration-ms=86400000
